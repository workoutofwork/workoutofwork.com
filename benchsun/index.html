<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    font-size: 12pt;
    font-weight: 400;
    line-height: 1.35;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    padding: clamp(1.5rem, 6vw, 4rem);
    transition: background-color 0.8s ease, color 0.6s ease;
    overflow-x: hidden;
}

body.weather-sun   { background: #ffffff; color: #1a1a1a; --muted: rgba(26,26,26,0.35); }
body.weather-cloud { background: #ffffff; color: #1a1a1a; --muted: rgba(26,26,26,0.35); }
body.weather-rain  { background: #ffffff; color: #1a1a1a; --muted: rgba(26,26,26,0.35); }
body.weather-night { background: #ffffff; color: #1a1a1a; --muted: rgba(26,26,26,0.35); }

.data-stack {
    width: 100%;
}

/* Weather icon loader */
.icon-loader, .icon-settled {
    display: block;
    width: 2em;
    height: 2em;
    margin-bottom: 0.3em;
}

.icon-loader svg, .icon-settled svg {
    width: 100%;
    height: 100%;
    fill: currentColor;
}

/* Each character types in */
.char {
    display: inline;
    opacity: 0;
}
.super {
    vertical-align: super;
    font-size: 0.6em;
}
.char.visible {
    opacity: 1;
}

/* Line break between data lines */
.line-break {
    display: block;
    height: 0.2em;
}

/* Footer */
.footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 0 clamp(1.5rem, 6vw, 4rem) 1.5rem;
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    line-height: 1.7;
    text-transform: uppercase;
}
.footer a { color: inherit; text-decoration: none; }

.hidden-link {
    position: fixed; top: 10px; right: 10px;
    font-size: 10px; opacity: 0.15; cursor: pointer;
    text-decoration: none; color: currentColor;
    text-transform: uppercase;
}
.hidden-link:hover { opacity: 0.4; }
</style>

const ICON_ORDER = ['sun', 'cloudy', 'rain', 'moon', 'pint', 'bench', 'home', 'wine', 'world'];

function getIconKey(code, isDay) {
    if (!isDay) return 'moon';
    if ([51,53,55,61,63,65,80,81,82,95,96,99].includes(code)) return 'rain';
    if ([2,3,45,48].includes(code)) return 'cloudy';
    return 'sun';
}
const pintPhrase = PINT_PHRASES[Math.floor(Math.random() * PINT_PHRASES.length)];

function fmt12(d) {
    let h = d.getHours();
    const m = d.getMinutes().toString().padStart(2, '0');
    const ap = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    return `${h}.${m}${ap}`;
}

function weatherDesc(code) {
    const d = {
        0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
        45: 'Fog', 48: 'Freezing fog',
        51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle',
        61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
        71: 'Light snow', 73: 'Snow', 75: 'Heavy snow',
        80: 'Light showers', 81: 'Showers', 82: 'Heavy showers',
        95: 'Thunderstorm', 96: 'Thunderstorm with hail', 99: 'Severe thunderstorm'
    };
    return d[code] || 'Fair';
}

function getBackgroundClass(code, isDay) {
    if (!isDay) return 'weather-night';
    if ([51,53,55,61,63,65,80,81,82,95,96,99].includes(code)) return 'weather-rain';
    if ([2,3,45,48].includes(code)) return 'weather-cloud';
    return 'weather-sun';
}

function isBenchInSun(date) {
    const pos = SunCalc.getPosition(date, LAT, LNG);
    const alt = pos.altitude * 180 / Math.PI;
    const az = (pos.azimuth * 180 / Math.PI + 180) % 360;
    if (alt <= 0) return false;
    if (az >= SHADE_AZ && alt < SHADE_ALT) return false;
    return true;
}

function getShadeTime(day) {
    const times = SunCalc.getTimes(day, LAT, LNG);
    let t = new Date(times.solarNoon);
    while (t < times.sunset) {
        const pos = SunCalc.getPosition(t, LAT, LNG);
        const alt = pos.altitude * 180 / Math.PI;
        const az = (pos.azimuth * 180 / Math.PI + 180) % 360;
        if (az >= SHADE_AZ && alt < SHADE_ALT && alt > 0) return new Date(t);
        t = new Date(t.getTime() + 60000);
    }
    return times.sunset;
}

function getPints() {
    const now = new Date();
    if (!isBenchInSun(now)) return 0;
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0);
    const shade = getShadeTime(today);
    return Math.floor(Math.max(0, (shade - now) / 60000) / 30);
}

function findSunWindows(hourlyTimes, hourlyCodes) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0);
    const shadeTime = getShadeTime(today);
    const windows = [];
    let ws = null, wm = 0;
    let t = new Date(today); t.setHours(12, 0, 0, 0);
    while (t < shadeTime) {
        let ni = 0, nd = Infinity;
        for (let i = 0; i < hourlyTimes.length; i++) {
            const d = Math.abs(new Date(hourlyTimes[i]) - t);
            if (d < nd) { nd = d; ni = i; }
        }
        if ([0, 1].includes(hourlyCodes[ni]) && isBenchInSun(t)) {
            if (!ws) ws = new Date(t);
            wm += 30;
        } else {
            if (ws && wm >= 30) windows.push({ start: ws, mins: wm });
            ws = null; wm = 0;
        }
        t = new Date(t.getTime() + 30 * 60000);
    }
    if (ws && wm >= 30) windows.push({ start: ws, mins: wm });
    return windows;
}

// ─── ICON CYCLING + TYPEWRITER ───
let _activeAnimTimers = [];
function animateDisplay(finalIconKey, lines) {
    // Kill any in-progress animation timers
    _activeAnimTimers.forEach(id => clearInterval(id));
    _activeAnimTimers = [];
    const stack = document.getElementById('dataStack');
    stack.innerHTML = '';

    // Create the icon element
    const iconEl = document.createElement('span');
    iconEl.className = 'icon-loader';
    stack.appendChild(iconEl);

    // Cycle through all icons twice at 0.2s each
    const fullCycle = [...ICON_ORDER, ...ICON_ORDER];
    let cycleIdx = 0;
    iconEl.innerHTML = ICONS[fullCycle[0]];

    const cycleInterval = setInterval(() => {
        cycleIdx++;
        if (cycleIdx >= fullCycle.length) {
            clearInterval(cycleInterval);
            iconEl.innerHTML = ICONS[finalIconKey];
            iconEl.className = 'icon-settled';
            startTyping(stack, lines);
            return;
        }
        iconEl.innerHTML = ICONS[fullCycle[cycleIdx]];
    }, 100);
    _activeAnimTimers.push(cycleInterval);
}

function startTyping(stack, lines) {
    // Build all characters as hidden spans
    const allChars = [];

    // 2 line breaks after the icon
    for (let b = 0; b < 2; b++) {
        const gap = document.createElement('span');
        gap.className = 'line-break';
        gap.style.opacity = '1';
        stack.appendChild(gap);
    }

    lines.forEach((text, lineIdx) => {
        // Line break before every line
        const br = document.createElement('span');
        br.className = 'line-break';
        br.style.opacity = '0';
        stack.appendChild(br);
        allChars.push({ el: br, isBr: true });

        if (text === '') {
            // Empty line = extra gap
            const gap = document.createElement('span');
            gap.className = 'line-break';
            gap.style.opacity = '0';
            stack.appendChild(gap);
            allChars.push({ el: gap, isBr: true });
            return;
        }
        for (let i = 0; i < text.length; i++) {
            const span = document.createElement('span');
            span.className = text[i] === '*' ? 'char super' : 'char';
            span.textContent = text[i];
            stack.appendChild(span);
            allChars.push({ el: span, isBr: false });
        }
    });

    // Type characters in
    let idx = 0;
    const speed = 35;

    const interval = setInterval(() => {
        if (idx >= allChars.length) {
            clearInterval(interval);
            return;
        }
        const item = allChars[idx];
        if (item.isBr) {
            item.el.style.opacity = '1';
        } else {
            item.el.classList.add('visible');
        }
        idx++;
    }, speed);
    _activeAnimTimers.push(interval);
}

// ─── MAIN ───
let _updateInProgress = false;
async function updateDisplay() {
    if (_updateInProgress) return;
    _updateInProgress = true;
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0);
    const times = SunCalc.getTimes(today, LAT, LNG);
    const shadeTime = getShadeTime(today);
    const isNight = now > times.sunset || now < times.sunrise;

    let temp = null, code = 0;
    let hourlyTimes = null, hourlyCodes = null;

    try {
        const resp = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LNG}&current=temperature_2m,weather_code,is_day&hourly=weather_code&timezone=Europe%2FLondon&forecast_days=1&models=ukmo_seamless`
        );
        const data = await resp.json();
        temp = Math.round(data.current.temperature_2m);
        code = data.current.weather_code;
        hourlyCodes = data.hourly.weather_code;
        hourlyTimes = data.hourly.time;
    } catch (e) { console.error('Fetch failed:', e); }

    document.body.className = getBackgroundClass(code, isNight ? 0 : 1);

    // Build lines
    const lines = [];

    if (temp !== null) lines.push(`${temp}°C`);
    lines.push(weatherDesc(code));

    // Bench sunset and sunset always included
    lines.push('');
    lines.push('');
    if (isNight) {
        lines.push(`Bench sunset was ${fmt12(shadeTime)}*`);
        lines.push(`Actual sunset was ${fmt12(times.sunset)}`);
        lines.push('');
        lines.push('');
        lines.push('The sun has set, we hope for sun (and pints) tomorrow');
    } else {
        let futureWindows = [], totalPints = 0;
        if (hourlyTimes && hourlyCodes) {
            const sw = findSunWindows(hourlyTimes, hourlyCodes);
            futureWindows = sw.filter(w => new Date(w.start.getTime() + w.mins * 60000) > now);
            let tm = 0;
            futureWindows.forEach(w => {
                const s = w.start > now ? w.start : now;
                tm += Math.max(0, (new Date(w.start.getTime() + w.mins * 60000) - s) / 60000);
            });
            totalPints = Math.floor(tm / 30);
        } else if (isBenchInSun(now)) {
            totalPints = getPints();
        }

        lines.push(`Bench sunset ${fmt12(shadeTime)}*`);
        lines.push(`Actual sunset ${fmt12(times.sunset)}`);

        const isMorning = now.getHours() < 12;

        if (isMorning) {
            // Before midday: assess afternoon forecast
            lines.push('');
            lines.push('');
            if (hourlyTimes && hourlyCodes) {
                // Count afternoon hours (12pm to shade time) by weather type
                const RAIN_CODES = [51,53,55,61,63,65,80,81,82,95,96,99];
                const SUN_CODES = [0, 1];
                let afternoonHours = 0, rainHours = 0, sunHours = 0;
                for (let i = 0; i < hourlyTimes.length; i++) {
                    const h = new Date(hourlyTimes[i]);
                    if (h.getHours() >= 12 && h < shadeTime) {
                        afternoonHours++;
                        if (RAIN_CODES.includes(hourlyCodes[i])) rainHours++;
                        if (SUN_CODES.includes(hourlyCodes[i])) sunHours++;
                    }
                }
                const rainPct = afternoonHours > 0 ? rainHours / afternoonHours : 0;
                if (rainPct >= 0.95) {
                    lines.push('Pints in the sun not open until after midday, but you can forget pints in the sun today');
                } else if (sunHours > 0) {
                    lines.push('Pints in the sun not open until after midday, but it\'s looking good for later');
                } else {
                    lines.push('Pints in the sun not open until after midday, but it\'s not looking good');
                }
            } else {
                lines.push('Pints in the sun not open until after midday');
            }
        } else if (isBenchInSun(now) && totalPints > 0) {
            lines.push('');
            lines.push('');
            lines.push(pintPhrase);
            lines.push(`${totalPints} pint window`);
        } else if (totalPints > 0) {
            const next = futureWindows.find(w => w.start > now);
            lines.push('');
            lines.push('');
            lines.push(totalPints >= 3 ? pintPhrase : 'Slim chance of pints today');
            if (next) lines.push(`${Math.floor(next.mins / 30)} pint window`);
        } else {
            lines.push('');
            lines.push('');
            lines.push("No chance of pints in the sun today");
        }
    }

    const finalIcon = getIconKey(code, isNight ? 0 : 1);
    animateDisplay(finalIcon, lines);
    _updateInProgress = false;
}

// ─── INIT ───
const params = new URLSearchParams(window.location.search);
if (params.has('shade_alt')) SHADE_ALT = parseFloat(params.get('shade_alt'));
if (params.has('shade_az')) SHADE_AZ = parseFloat(params.get('shade_az'));

updateDisplay();
setInterval(updateDisplay, 5 * 60 * 1000);

// ─── CALIBRATE ───
document.getElementById('adjustLink').addEventListener('click', (e) => {
    e.preventDefault();
    const a = prompt('Shade altitude (current: ' + SHADE_ALT + '):', SHADE_ALT);
    if (a !== null && a !== '') SHADE_ALT = parseFloat(a);
    const z = prompt('Shade azimuth (current: ' + SHADE_AZ + '):', SHADE_AZ);
    if (z !== null && z !== '') SHADE_AZ = parseFloat(z);
    const p = new URLSearchParams(window.location.search);
    p.set('shade_alt', SHADE_ALT); p.set('shade_az', SHADE_AZ);
    window.history.replaceState({}, '', '?' + p.toString());
    updateDisplay();
});
