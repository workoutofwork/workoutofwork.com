<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Three Questions With…</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #111;
    --panel: #1a1a1a;
    --panel-2: #222;
    --text: #eee;
    --muted: #888;
    --accent: #FFE0C9;
    --border: #2a2a2a;
    --error: #e08a8a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 28px 24px;
    width: 340px;
    max-width: calc(100% - 32px);
  }
  h1 {
    font-size: 15px;
    margin: 0 0 18px 0;
    letter-spacing: 0.2px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  input[type=password] {
    width: 100%;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font: inherit;
    font-size: 14px;
  }
  input[type=password]:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  button {
    width: 100%;
    margin-top: 14px;
    background: var(--accent);
    color: #111;
    border: 0;
    border-radius: 6px;
    padding: 11px 12px;
    font: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.05); }
  button:disabled { opacity: 0.6; cursor: default; }
  .msg {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    min-height: 16px;
  }
  .msg.err { color: var(--error); }
</style>
</head>
<body>
  <form class="card" id="form" autocomplete="off">
    <h1>Three Questions With…</h1>
    <label for="pw">Password</label>
    <input type="password" id="pw" autofocus autocomplete="off" />
    <button type="submit" id="go">Unlock</button>
    <div class="msg" id="msg"></div>
  </form>

const ITER = 250000;

function b64ToBytes(b) {
  const bin = atob(b);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function deriveKey(password, saltBytes) {
  const enc = new TextEncoder();
  const material = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: saltBytes, iterations: ITER, hash: "SHA-256" },
    material,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

const form = document.getElementById("form");
const pw   = document.getElementById("pw");
const go   = document.getElementById("go");
const msg  = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  msg.className = "msg";
  msg.textContent = "Decrypting…";
  go.disabled = true;
  try {
    const salt = b64ToBytes(SALT);
    const iv   = b64ToBytes(IV);
    const ct   = b64ToBytes(CT);
    const key  = await deriveKey(pw.value, salt);
    const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
    const html = new TextDecoder("utf-8").decode(plainBuf);
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    msg.className = "msg err";
    msg.textContent = "Wrong password.";
    go.disabled = false;
    pw.select();
  }
});
</script>
